name: Fork Release

# Lean release pipeline for this fork. The upstream release.yml depends on the
# upstream org's self-hosted runners and relay/Clerk production config, so it
# cannot run here; this workflow builds a macOS arm64 artifact on a
# GitHub-hosted runner and publishes it as a GitHub Release. Desktop builds
# embed this repo as their electron-updater feed (GITHUB_REPOSITORY at build
# time), so installed apps auto-update from these releases.
#
# The build is signed + notarized when the Apple secrets are present (see
# docs/operations/release.md); otherwise it falls back to an unsigned build
# whose auto-update install may be blocked by macOS Gatekeeper.

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-nightly.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.0.29 or v0.0.29)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_release:
    name: Build and publish macOS arm64
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${DISPATCH_VERSION}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          # Plain X.Y.Z versions become the release the updater's stable
          # channel follows; suffixed versions publish as prereleases it
          # ignores (useful for pipeline smoke tests).
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ steps.release_meta.outputs.version }}"

      - name: Build desktop artifact
        shell: bash
        env:
          # macOS Developer ID signing + notarization. Leave every secret unset
          # to build unsigned (auto-update install may be blocked by Gatekeeper).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Optional: only needed for Clerk passkey (Associated Domains) builds.
          # Plain auto-update signing does not require these.
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
          T3CODE_CLERK_PASSKEY_RP_DOMAINS: ${{ vars.CLERK_PASSKEY_RP_DOMAINS }}
        run: |
          set -euo pipefail

          args=(
            --platform mac
            --target dmg
            --arch arm64
            --build-version "${{ steps.release_meta.outputs.version }}"
            --verbose
          )

          has_all() {
            for value in "$@"; do
              [[ -n "$value" ]] || return 1
            done
            return 0
          }

          if has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
            # electron-builder reads the notarization key from a file path.
            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY" > "$key_path"
            export APPLE_API_KEY="$key_path"

            # Opt into Clerk passkey (Associated Domains) signing only when a
            # provisioning profile is supplied. Otherwise do a plain Developer ID
            # sign + notarize, which is all desktop auto-update needs.
            if [[ -n "$MACOS_PROVISIONING_PROFILE" ]]; then
              if [[ -z "$APPLE_TEAM_ID" ]]; then
                echo "MACOS_PROVISIONING_PROFILE is set but APPLE_TEAM_ID is missing." >&2
                exit 1
              fi
              profile_path="$RUNNER_TEMP/agent-hub-code.provisionprofile"
              printf '%s' "$MACOS_PROVISIONING_PROFILE" | base64 -D > "$profile_path"
              security cms -D -i "$profile_path" >/dev/null
              export T3CODE_APPLE_TEAM_ID="$APPLE_TEAM_ID"
              export T3CODE_MACOS_PROVISIONING_PROFILE="$profile_path"
              echo "macOS signing enabled (Developer ID + notarization + passkey Associated Domains)."
            else
              echo "macOS signing enabled (Developer ID + notarization)."
            fi
            args+=(--signed)
          else
            echo "macOS signing disabled: set CSC_LINK, CSC_KEY_PASSWORD, APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER to enable."
          fi

          vp run dist:desktop:artifact "${args[@]}"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.blockmap" \
            "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done
          ls -la release-publish

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: T3 Code v${{ steps.release_meta.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          files: |
            release-publish/*.dmg
            release-publish/*.zip
            release-publish/*.blockmap
            release-publish/*.yml
          fail_on_unmatched_files: true
